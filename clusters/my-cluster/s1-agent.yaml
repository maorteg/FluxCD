apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: s1-agent
  namespace: sentinelone
spec:
  interval: 1h
  releaseName: sentinelone
  chart:
    spec:
      chart: s1-agent
      version: 25.4.2
      sourceRef:
        kind: HelmRepository
        name: sentinelone
        namespace: flux-system

  upgrade:
    cleanupOnFail: true

  driftDetection:
    mode: enabled

  values:
    configuration:
      cluster:
        name: "MinikubeLab"
      repositories:
        agent: "containers.sentinelone.net/cws-agent/s1agent"
        helper: "containers.sentinelone.net/cws-agent/s1helper"
      tag:
        agent: 25.4.2-ga
        helper: 25.4.2-ga
      env:
        agent:
          log_level: debug
        helper:
          log_level: debug
      inventory_enabled: true
      communicator_enabled: true
      admission_controllers:
        validating:
          enabled: true
          inventory_only: false
      # Detector config in string format
      overrideConf: |
        [detectors]
        execute_from_memfd.lua.enabled=true
        execute_from_memfd.lua.verdict=silent
      
      agent:
        resources:
          limits:
            memory: 1945Mi
        requests:
          memory: 800Mi
      helper:
        resources:
          limits:
            memory: 1945Mi
        requests:
          memory: 1945Mi
    secrets:
      imagePullSecret: sentinelone-pull-secret
      site_key:
        name: s1-site-key
